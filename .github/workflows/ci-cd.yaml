name: CI/CD Restauranty

on:
  push:
    branches: [ integration ]
  pull_request:
    branches: [ integration ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    - name: Build & push images
      run: |
        docker build -t cesarboada/restauranty:auth ./backend/auth
        docker push cesarboada/restauranty:auth
        docker build -t cesarboada/restauranty:discounts ./backend/discounts
        docker push cesarboada/restauranty:discounts
        docker build -t cesarboada/restauranty:items ./backend/items
        docker push cesarboada/restauranty:items
        docker build -t cesarboada/restauranty:frontend ./client
        docker push cesarboada/restauranty:frontend

  deploy-to-aks:
    needs: build-and-push
    if: github.ref == 'refs/heads/integration'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    - name: Get AKS credentials
      run: az aks get-credentials --resource-group restauranty-latino-rg --name restauranty-latino-aks
    - name: Deploy to AKS
      run: kubectl apply -f k8s/