apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: restauranty
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/gerardogm-devops/restauranty-latin-team.git
    targetRevision: integration
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: restauranty
  syncPolicy:
    automated:
      prune: true
      selfHeal: true