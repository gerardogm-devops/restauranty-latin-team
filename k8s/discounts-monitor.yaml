apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: discounts-monitor
  namespace: monitoring
  labels:
    release: prometheus
spec:
  selector:
    matchLabels:
      app: discounts
  namespaceSelector:
    matchNames:
      - default
  endpoints:
  - port: http
    path: /metrics
    interval: 30s
    scheme: http